<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="youtube.css">

</head>

<body>
    <header class="header">
        <div class="left">
            <div class="menu">
                ☰
            </div>
            <div class="logo">
                YouTube
            </div>
        </div>

        <div class="middle">
            <input type="text" placeholder="Search YouTube">
            <button>
                Search
            </button>
        </div>
        <div class="right">
            <span>Create</span>
            <span>Bell</span>
            <span>User</span>
        </div>
    </header>
    <section class="sidebar">
    </section>
    <section class="videos">
        <div class="card">
            <img src="https://i.ytimg.com/vi/Ke90Tje7VS0/maxresdefault.jpg" alt="video">
            <h3>HTML Full Course</h3>
            <p>CodeWithHarry</p>
            <span>1M Views</span>
        </div>
        <div class="card">
            <img src="https://i.ytimg.com/vi/Edsxf_NBFrw/maxresdefault.jpg" alt="video">
            <h3>CSS Tutorial</h3>
            <p>Apna College</p>
            <span>500K Views</span>
        </div>
        <div class="card">
            <img src="https://i.ytimg.com/vi/ZxKM3DCV2kE/maxresdefault.jpg" alt="video">
            <h3>JavaScript Basics</h3>
            <p>Tech Gun</p>
            <span>900K Views</span>
        </div>
        <div class="card">
            <img src="https://i.ytimg.com/vi/HcOc7P5BMi4/maxresdefault.jpg" alt="video">
            <h3>React JS Course</h3>
            <p>FreeCodeCamp</p>
            <span>2M Views</span>
        </div>
    </section>
</body>
</html>
